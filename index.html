<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Danni Flotta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-red: #ed2939; /* Rosso Croce Rossa */
            --text-main: #c5c6c7;
            --text-bright: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        /* Nascondo la barra di scorrimento per un look più pulito sulla TV */
        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Intestazione */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 1rem;
            margin-bottom: 3rem;
            position: sticky;
            top: 0;
            background-color: rgba(11, 12, 16, 0.95);
            z-index: 100;
        }

        h1 {
            color: var(--text-bright);
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-badge {
            background: rgba(237, 41, 57, 0.1);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Pallino lampeggiante */
        .dot {
            height: 12px;
            width: 12px;
            background-color: var(--accent-red);
            border-radius: 50%;
            display: inline-block;
        }

        /* Griglia Dashboard */
        #dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
        }

        /* Schede Veicoli */
        .card {
            background-color: var(--card-bg);
            border-left: 5px solid var(--accent-red);
            padding: 1.5rem;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sigla-radio {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--text-bright);
        }

        .id-segnalazione {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: #66fcf1;
        }

        .difetto-tipo {
            display: inline-block;
            background: #2b3a4a;
            padding: 0.4rem 1rem;
            border-radius: 3px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-bright);
        }

        .difetto-descrizione {
            font-size: 1.4rem;
            line-height: 1.5;
            flex-grow: 1;
            color: #e0e0e0;
        }

        .autista {
            font-size: 1.1rem;
            color: #888;
            text-align: right;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1rem;
            font-style: italic;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(237, 41, 57, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(237, 41, 57, 0); }
            100% { box-shadow: 0 0 0 0 rgba(237, 41, 57, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>DASHBOARD SEGNALAZIONI VEICOLI</h1>
        <div class="status-badge">
            <span class="dot"></span>
            LIVE SYNC
        </div>
    </header>

    <div id="dashboard-grid">
        </div>

    <script>
        // Il tuo link ufficiale a Google Sheets
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8wQ0jGLsUvO8VqP8SnyuLlar0zApUn1maRLMEWMFL2EFrv2LFcxGkLJ6X3vf4ilsDWPRAzHjcub-l/pub?output=csv';

        // Funzione per scaricare i dati
        async function fetchDashboardData() {
            try {
                // Aggiungiamo un parametro casuale per forzare il browser a non usare la cache e scaricare i dati freschi
                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                const csvText = await response.text();
                processCSV(csvText);
            } catch (error) {
                console.error('Errore di connessione:', error);
            }
        }

        // Funzione per tradurre il CSV in schede grafiche
        function processCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = ''; // Svuota la griglia prima di aggiornare

            // Salta l'intestazione (i = 1)
            for (let i = 1; i < lines.length; i++) {
                // Questa formula divide le colonne in modo intelligente (ignora le virgole dentro le descrizioni)
                const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                if (columns.length >= 4) {
                    // Mappatura colonne
                    // 0: ID, 1: Sigla Radio, 2: Tipo difetto, 3: Descrizione, 4: Foto, 5: Autista
                    const id = columns[0] ? columns[0].trim().replace(/"/g, '') : 'N/A';
                    const sigla = columns[1] ? columns[1].trim().replace(/"/g, '') : 'SCONOSCIUTA';
                    const tipo = columns[2] ? columns[2].trim().replace(/"/g, '') : '-';
                    const desc = columns[3] ? columns[3].trim().replace(/"/g, '') : 'Nessun dettaglio';
                    const autista = columns[5] ? columns[5].trim().replace(/"/g, '') : 'Non specificato';

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="sigla-radio">${sigla}</span>
                            <span class="id-segnalazione">${id}</span>
                        </div>
                        <div>
                            <span class="difetto-tipo">${tipo}</span>
                        </div>
                        <div class="difetto-descrizione">
                            ${desc}
                        </div>
                        <div class="autista">
                            Segnalato da: ${autista}
                        </div>
                    `;
                    grid.appendChild(card);
                }
            }
        }

        // 1. Carica i dati appena apri la pagina
        fetchDashboardData();

        // 2. Aggiorna i dati in automatico ogni 60 secondi (60000 millisecondi)
        setInterval(fetchDashboardData, 60000);

        // 3. Sistema di Auto-Scroll cinematografico per la TV
        let scrollSpeed = 1; // Velocità di scorrimento
        let delay = 30; // Fluidità (millisecondi)
        let isPaused = false;

        setInterval(() => {
            if(!isPaused) {
                // Se siamo arrivati in fondo alla pagina
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 5) {
                    isPaused = true;
                    // Aspetta 3 secondi in fondo, poi torna su di scatto e ricomincia
                    setTimeout(() => {
                        window.scrollTo(0, 0);
                        isPaused = false;
                    }, 3000);
                } else {
                    window.scrollBy(0, scrollSpeed);
                }
            }
        }, delay);
    </script>
</body>
</html>
