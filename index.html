<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD DIFETTI AUTOPARCO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-base: #030508;
            --bg-glow: #0a1118;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f4f8;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent: #00d0ff;
            --red-neon: #ff3d57;
            --green-neon: #00e676;
        }

        body.light-mode {
            --bg-base: #e2e8f0;
            --bg-glow: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #0066cc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% 0%, var(--bg-glow) 0%, var(--bg-base) 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* --- HEADER --- */
        .header {
            height: 115px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }

        .header h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-right { display: flex; align-items: center; gap: 35px; }

        .qr-section {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        
        body.light-mode .qr-section { background: rgba(0, 0, 0, 0.03); }

        .qr-text { text-align: right; line-height: 1.2; }
        .qr-text span { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .qr-text strong { display: block; font-size: 0.95rem; color: var(--accent); font-weight: 800; }

        #qrcode { 
            background: white; 
            padding: 6px; 
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        #clock { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 2.4rem; 
            font-weight: 700;
            line-height: 1;
        }

        .live-tag {
            color: var(--red-neon);
            border: 1px solid var(--red-neon);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            animation: blink 2s infinite;
            display: inline-block;
            margin-bottom: 5px;
        }

        /* --- DASHBOARD GRID --- */
        #listaDifetti {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            grid-auto-rows: min-content; /* Adatta l'altezza alla riga */
            gap: 20px;
            padding: 30px 40px;
            overflow-y: auto;
            align-content: start; /* Evita stretching verticale dei box */
        }

        .veicolo-group {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px;
            display: block; /* Rimosso flex per adattarsi al contenuto */
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            height: fit-content; /* Fondamentale per non allungarsi */
        }

        .veicolo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .veicolo-sigla {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .badge-conteggio {
            background: var(--red-neon);
            color: white;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 1rem;
        }

        .difetto-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }

        .difetto-card:last-child { margin-bottom: 0; }

        .tipologia-badge {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
            display: block;
        }

        .descrizione { font-size: 1rem; line-height: 1.4; font-weight: 400; color: var(--text-main); }
        .data-segnalazione { font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 8px; text-align: right;}

        .tutto-ok {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px;
            font-size: 2.2rem;
            color: var(--green-neon);
            border: 2px dashed var(--green-neon);
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 800;
            background: rgba(0, 230, 118, 0.03);
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* Scrollbar sottile */
        #listaDifetti::-webkit-scrollbar { width: 6px; }
        #listaDifetti::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard difetti autoparco</h1>
        
        <div class="header-right">
            <div class="qr-section">
                <div class="qr-text">
                    <span>Segnalazioni veloci</span>
                    <strong>Scarica l'App Autoparco CRI</strong>
                </div>
                <div id="qrcode"></div>
            </div>

            <div style="text-align: right; min-width: 140px;">
                <span class="live-tag">Live</span>
                <div id="clock">00:00</div>
            </div>
        </div>
    </div>

    <div id="listaDifetti">
        <div style="text-align: center; width: 100%; font-size: 1.2rem; opacity: 0.5;">Sincronizzazione flotta in corso...</div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8wQ0jGLsUvO8VqP8SnyuLlar0zApUn1maRLMEWMFL2EFrv2LFcxGkLJ6X3vf4ilsDWPRAzHjcub-l/pub?output=csv';
        const appUrl = 'https://crigallarate1864.github.io/app_autoparco/';

        // Genera QR Code (85px per ottima visibilità su 48")
        new QRCode(document.getElementById("qrcode"), { 
            text: appUrl, 
            width: 85, 
            height: 85,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });

        function updateClock() {
            const now = new Date();
            const hour = now.getHours();
            // Light Mode 08:00 - 18:00
            if (hour >= 8 && hour < 18) document.body.classList.add('light-mode');
            else document.body.classList.remove('light-mode');

            document.getElementById('clock').innerText = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();

        function caricaDati() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const dati = results.data;
                    const listaDiv = document.getElementById('listaDifetti');
                    listaDiv.innerHTML = '';

                    const difettiValidi = dati.filter(riga => {
                        const haSigla = riga['Sigla radio'] && riga['Sigla radio'].trim() !== '';
                        const eRisolto = Object.values(riga).some(val => typeof val === 'string' && val.trim().toLowerCase() === 'risolto');
                        return haSigla && !eRisolto;
                    });

                    if (difettiValidi.length === 0) {
                        listaDiv.innerHTML = '<div class="tutto-ok">✅ Nessun difetto rilevato</div>';
                        return;
                    }

                    const raggruppati = {};
                    difettiValidi.reverse().forEach(d => {
                        // FIX: Prendi solo i primi 7 caratteri (es. VA11-32)
                        const siglaPulita = d['Sigla radio'].trim().substring(0, 7).toUpperCase();
                        if (!raggruppati[siglaPulita]) raggruppati[siglaPulita] = [];
                        raggruppati[siglaPulita].push(d);
                    });

                    Object.keys(raggruppati).sort().forEach(sigla => {
                        const mezzoDiv = document.createElement('div');
                        mezzoDiv.className = 'veicolo-group';
                        
                        let htmlDifetti = '';
                        raggruppati[sigla].forEach(difetto => {
                            let problemi = [];
                            if (difetto['Difetto motore e meccanica ⚙️']) problemi.push('⚙️ ' + difetto['Difetto motore e meccanica ⚙️']);
                            if (difetto['Elettrico e Dispositivi di Emergenza 🚑']) problemi.push('🚑 ' + difetto['Elettrico e Dispositivi di Emergenza 🚑']);
                            if (difetto['Carrozzeria e vetri']) problemi.push('🚙 ' + difetto['Carrozzeria e vetri']);
                            if (difetto['Vano Sanitario e Interni']) problemi.push('🩺 ' + difetto['Vano Sanitario e Interni']);
                            if (difetto['Descrizione difetto']) problemi.push('📝 ' + difetto['Descrizione difetto']);

                            htmlDifetti += `
                                <div class="difetto-card">
                                    <span class="tipologia-badge">${difetto['Tipologia Difetto'] || 'GENERICO'}</span>
                                    <div class="descrizione">${problemi.join('<br>') || 'Dettaglio non specificato'}</div>
                                    <span class="data-segnalazione">${difetto['Informazioni cronologiche'] || ''}</span>
                                </div>`;
                        });

                        mezzoDiv.innerHTML = `
                            <div class="veicolo-header">
                                <span class="veicolo-sigla">🚐 ${sigla}</span>
                                <span class="badge-conteggio">${raggruppati[sigla].length}</span>
                            </div>
                            <div class="difetti-lista">${htmlDifetti}</div>`;
                        listaDiv.appendChild(mezzoDiv);
                    });
                }
            });
        }

        // Refresh dati ogni 5 minuti
        setInterval(caricaDati, 300000); 
        caricaDati();
    </script>
</body>
</html>
